<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>EAN13 automático</title>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

    <style>
        
        #body {
            font-family: Arial;
            text-align: center;
            margin-top: 60px;
        }

        #codigo {
            font-size: 26px;
            margin: 20px;
            font-weight: bold;
        }        
        
        #timer {
            color: #00f;
        }
        
    </style>
</head>

<body>

    <h2>Generador automático EAN-13</h2>

    <div id="codigo"></div>

    <svg id="barcode"></svg>

    <p id="timer"></p>

    <script>

        function pad(n){
        return n.toString().padStart(2,"0");
        }

        function calcularCheckDigit(codigo12){

        let suma = 0;

        for(let i=0;i<12;i++){

        let num = parseInt(codigo12[i]);

        if(i % 2 === 0){
        suma += num;
        }else{
        suma += num * 3;
        }
        }

        let mod = suma % 10;
        return (10 - mod) % 10;
        }

        function generar(){

        let now = new Date();

        let MM = pad(now.getMonth()+1);
        let DD = pad(now.getDate());
        let HH = pad(now.getHours());
        let mm = pad(now.getMinutes()-1);

        let base = "2400" + MM + DD + HH + mm;

        let check = calcularCheckDigit(base);

        let codigo = base + check;

        document.getElementById("codigo").innerText = codigo;

        JsBarcode("#barcode", codigo, {
            format: "EAN13",
            width: 95vw,
            height: 200,
            displayValue: true
        });

        }

        function iniciar(){

        generar();

        let tiempo = 30;

        setInterval(()=>{
        tiempo--;
        document.getElementById("timer").innerText =
        "Nuevo código en " + tiempo + " s";

        if(tiempo <= 0){
        generar();
        tiempo = 30;
        }

        },1000);

        }

        iniciar();

    </script>

</body>

</html>
