<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EAN13 automático</title>

    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial;
            text-align: center;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 20px;
        }

        #codigo {
            font-size: 18px;
            margin: 10px 0;
            font-weight: bold;
        }

        #barcode {
            width: 95vw;
            height: auto;
            max-width: 95vw;
            margin: 20px auto;
            display: block;
        }
        
        #timer {
            color: #00f;
            margin-top: 20px;
            font-size: 16px;
        }

        /* Desktop view */
        @media (min-width: 768px) {
            h2 {
                font-size: 24px;
                margin-bottom: 30px;
            }

            #codigo {
                font-size: 20px;
            }

            #barcode {
                width: 80vw;
                max-width: 600px;
            }

            #timer {
                font-size: 18px;
            }
        }
    </style>
</head>

<body>

    <h2>Generador automático EAN-13</h2>

    <div id="codigo"></div>

    <svg id="barcode"></svg>

    <p id="timer"></p>

    <script>

        function pad(n){
            return n.toString().padStart(2,"0");
        }

        function calcularCheckDigit(codigo12){
            let suma = 0;
            for(let i=0;i<12;i++){ 
                let num = parseInt(codigo12[i]);
                if(i % 2 === 0){
                    suma += num;
                }
                else{
                    suma += num * 3;
                }
            }
            let mod = suma % 10;
            return (10 - mod) % 10;
        }

        function generar(){
        let now = new Date();
        let MM = pad(now.getMonth()+1);
        let DD = pad(now.getDate());
        let HH = pad(now.getHours());
        let mm = pad(now.getMinutes());
        if (mm == 0){mm = 59;}
        else {mm -= 1;}
            
        let base = "2400" + MM + DD + HH + mm;

        let check = calcularCheckDigit(base);

        let codigo = base + check;

        document.getElementById("codigo").innerText = codigo;

        JsBarcode("#barcode", codigo, {
            format: "EAN13",
            width: 4,
            height: 250,
            displayValue: true
        });

        }

        function iniciar(){

        generar();

        let tiempo = 30;

        setInterval(()=>{
        tiempo--;
        document.getElementById("timer").innerText =
        "Nuevo código en " + tiempo + " s";

        if(tiempo <= 0){
        generar();
        tiempo = 30;
        }

        },1000);

        }

        iniciar();

    </script>

</body>
</html>
